{% extends "base.html" %}
{% block title %}AI 会议纪要 - 美国第一投资{% endblock %}
{% block nav_sub %}<span class="nav-sub"><a href="/" class="nav-back">&larr; 返回首页</a> / AI会议纪要</span>{% endblock %}
{% block content %}
<section class="upload-section">
    <h2>上传会议录音</h2>
    {% if error %}
    <div class="alert error">{{ error }}</div>
    {% endif %}
    <form action="/minutes/upload" method="post" enctype="multipart/form-data" class="upload-form" id="uploadForm">
        <div class="form-group">
            <label for="title">会议标题（可选）</label>
            <input type="text" id="title" name="title" placeholder="留空将由 AI 根据内容自动生成">
        </div>
        <div class="form-row">
            <div class="form-group form-group-half">
                <label for="meeting_time">会议时间（可选）</label>
                <input type="datetime-local" id="meeting_time" name="meeting_time">
            </div>
            <div class="form-group form-group-half">
                <label for="location">会议地点（可选）</label>
                <input type="text" id="location" name="location" placeholder="如：3楼会议室A">
            </div>
        </div>
        <div class="form-group">
            <label for="participants">参与人（可选）</label>
            <input type="text" id="participants" name="participants" placeholder="多人用逗号分隔，如：张三, 李四, 王五">
        </div>
        <div class="form-group">
            <label for="file">音频文件</label>
            <input type="file" id="file" name="file" accept=".mp3,.m4a,.wav,.flac,.ogg,.mp4,.webm,.aac,.opus">
            <small>支持 MP3, M4A, WAV, FLAC, OGG, MP4, WebM, AAC, OPUS</small>
        </div>
        <div class="form-group">
            <label>或 直接录音</label>
            <div class="recorder-box" id="recorderBox">
                <button type="button" class="btn btn-record" id="btnRecord">
                    <span class="rec-icon" id="recIcon"></span>
                    <span id="recLabel">开始录音</span>
                </button>
                <span class="rec-timer" id="recTimer"></span>
                <span class="rec-status" id="recStatus"></span>
            </div>
        </div>
        <div class="form-group form-group-inline">
            <label class="checkbox-label">
                <input type="checkbox" name="push_feishu" id="push_feishu" checked>
                <span class="checkbox-text">处理完成后推送到飞书群</span>
            </label>
        </div>
        <button type="submit" class="btn btn-primary" id="btnSubmit">上传并分析</button>
        <div class="upload-progress" id="uploadProgress" style="display:none">
            <div class="progress-bar-track">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <span class="progress-text" id="progressText">准备上传...</span>
        </div>
    </form>
</section>

{% endblock %}

{% block scripts %}
<script>
(function() {
    const btnRecord = document.getElementById('btnRecord');
    const recIcon = document.getElementById('recIcon');
    const recLabel = document.getElementById('recLabel');
    const recTimer = document.getElementById('recTimer');
    const recStatus = document.getElementById('recStatus');
    const fileInput = document.getElementById('file');
    const form = document.getElementById('uploadForm');
    const titleInput = document.getElementById('title');
    const meetingTimeInput = document.getElementById('meeting_time');
    const locationInput = document.getElementById('location');
    const participantsInput = document.getElementById('participants');
    const pushFeishuInput = document.getElementById('push_feishu');

    let mediaRecorder = null;
    let chunks = [];
    let startTime = 0;
    let timerInterval = null;
    let recordedBlob = null;

    function formatTime(ms) {
        const totalSec = Math.floor(ms / 1000);
        const m = Math.floor(totalSec / 60);
        const s = totalSec % 60;
        return String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');
    }

    function setRecording(active) {
        if (active) {
            btnRecord.classList.add('recording');
            recIcon.classList.add('recording');
            recLabel.textContent = '停止录音';
        } else {
            btnRecord.classList.remove('recording');
            recIcon.classList.remove('recording');
            recLabel.textContent = '开始录音';
        }
    }

    btnRecord.addEventListener('click', async function() {
        if (mediaRecorder && mediaRecorder.state === 'recording') {
            mediaRecorder.stop();
            return;
        }

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            chunks = [];
            recordedBlob = null;
            recStatus.textContent = '';
            fileInput.value = '';

            const mimeType = MediaRecorder.isTypeSupported('audio/webm;codecs=opus')
                ? 'audio/webm;codecs=opus'
                : 'audio/webm';
            mediaRecorder = new MediaRecorder(stream, { mimeType });

            mediaRecorder.ondataavailable = function(e) {
                if (e.data.size > 0) chunks.push(e.data);
            };

            mediaRecorder.onstop = function() {
                clearInterval(timerInterval);
                stream.getTracks().forEach(t => t.stop());
                setRecording(false);

                recordedBlob = new Blob(chunks, { type: mimeType });
                const sizeMB = (recordedBlob.size / 1024 / 1024).toFixed(1);
                const duration = formatTime(Date.now() - startTime);
                recStatus.textContent = '录音完成 (' + duration + ', ' + sizeMB + ' MB)';
                recTimer.textContent = '';
            };

            mediaRecorder.start(1000);
            startTime = Date.now();
            setRecording(true);

            timerInterval = setInterval(function() {
                recTimer.textContent = formatTime(Date.now() - startTime);
            }, 500);

        } catch (err) {
            recStatus.textContent = '无法访问麦克风: ' + err.message;
        }
    });

    let uploading = false;

    function uploadWithProgress(fd) {
        if (uploading) return;
        uploading = true;

        const btn = document.getElementById('btnSubmit');
        const progressBox = document.getElementById('uploadProgress');
        const progressFill = document.getElementById('progressFill');
        const progressText = document.getElementById('progressText');

        btn.disabled = true;
        btn.textContent = '上传中...';
        progressBox.style.display = 'flex';
        progressFill.style.width = '0%';
        progressText.textContent = '准备上传...';

        const xhr = new XMLHttpRequest();

        xhr.upload.addEventListener('progress', function(e) {
            if (e.lengthComputable) {
                const pct = Math.round((e.loaded / e.total) * 100);
                progressFill.style.width = pct + '%';
                const sizeMB = (e.loaded / 1024 / 1024).toFixed(1);
                const totalMB = (e.total / 1024 / 1024).toFixed(1);
                if (pct < 100) {
                    progressText.textContent = '上传中 ' + sizeMB + ' / ' + totalMB + ' MB (' + pct + '%)';
                } else {
                    progressText.textContent = '上传完成，等待服务器处理...';
                }
            }
        });

        xhr.addEventListener('load', function() {
            if (xhr.status >= 200 && xhr.status < 400) {
                progressText.textContent = '提交成功，正在跳转...';
                progressFill.style.width = '100%';
                var url = xhr.responseURL || '/minutes/';
                window.location.href = url;
            } else {
                resetUpload('服务器返回错误: ' + xhr.status);
            }
        });

        xhr.addEventListener('error', function() {
            resetUpload('网络错误，请检查连接后重试');
        });

        xhr.addEventListener('abort', function() {
            resetUpload('上传已取消');
        });

        xhr.open('POST', '/minutes/upload');
        xhr.send(fd);

        function resetUpload(msg) {
            uploading = false;
            btn.disabled = false;
            btn.textContent = '上传并分析';
            progressFill.style.width = '0%';
            progressText.textContent = msg;
            progressText.style.color = '#dc2626';
            setTimeout(function() { progressBox.style.display = 'none'; progressText.style.color = ''; }, 4000);
        }
    }

    form.addEventListener('submit', function(e) {
        e.preventDefault();
        if (uploading) return;

        const hasFile = fileInput.files && fileInput.files.length > 0;
        if (!hasFile && !recordedBlob) {
            recStatus.textContent = '请选择文件或先录音';
            recStatus.style.color = '#dc2626';
            return;
        }

        const fd = new FormData();

        if (recordedBlob && !hasFile) {
            const now = new Date();
            const ts = now.getFullYear()
                + String(now.getMonth() + 1).padStart(2, '0')
                + String(now.getDate()).padStart(2, '0')
                + '_'
                + String(now.getHours()).padStart(2, '0')
                + String(now.getMinutes()).padStart(2, '0');
            fd.append('file', recordedBlob, 'recording_' + ts + '.webm');
        } else {
            fd.append('file', fileInput.files[0]);
        }

        fd.append('title', titleInput.value || '');
        if (meetingTimeInput.value) fd.append('meeting_time', meetingTimeInput.value);
        if (locationInput.value) fd.append('location', locationInput.value);
        if (participantsInput.value) fd.append('participants', participantsInput.value);
        if (pushFeishuInput.checked) fd.append('push_feishu', 'on');

        uploadWithProgress(fd);
    });
})();
</script>
{% endblock %}
